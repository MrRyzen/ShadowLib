name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-test:
    name: Build & Test (.NET ${{ matrix.dotnet }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dotnet: ['8.0.x']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Restore
        run: dotnet restore ShadowLib.sln

      - name: Build (Release)
        run: dotnet build ShadowLib.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test ShadowLib.sln --configuration Release --no-build --logger "trx;LogFileName=test-results.trx" --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.dotnet }}
          path: TestResults/
          retention-days: 14

  package-dryrun:
    name: Pack dry-run (NuGet + UPM)
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Pack NuGet
        run: |
          dotnet pack Runtime/ShadowLib.csproj --configuration Release --output artifacts/nuget

      - name: Pack UPM tarball
        run: |
          npm pack --pack-destination artifacts/upm

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-dryrun
          path: artifacts/
          retention-days: 14
